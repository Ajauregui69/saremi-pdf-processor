version: '3.8'

services:
  pdf-processor:
    build: .
    container_name: livo-pdf-processor
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      # Montar código en desarrollo (comentar en producción)
      - .:/app
      # Volumen temporal para archivos procesados
      - /tmp/pdf-processor:/tmp/pdf-processor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - livo-network

networks:
  livo-network:
    driver: bridge
